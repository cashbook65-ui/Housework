<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家事工作記錄表</title>
    <style>
        body { font-family: Arial, "Microsoft JhengHei", sans-serif; margin: 20px; background-color: #f4f6f9; }
        h1, h2 { text-align: center; color: #333; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* 規則區塊 */
        .rules-table, .summary-card { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        .rules-table th, .rules-table td { border: 1px solid #ccc; padding: 8px; text-align: center; }
        .rules-table th { background-color: #e9ecef; }
        
        /* 表單區塊 */
        .form-group { background: #eef2f5; padding: 15px; border-radius: 6px; margin-bottom: 20px; }
        .form-row { margin-bottom: 10px; }
        label { font-weight: bold; margin-right: 10px; }
        .checkbox-group { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; margin-top: 8px; }
        button { background-color: #28a745; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #218838; }
        .btn-export { background-color: #007bff; margin-left: 10px; }
        .btn-export:hover { background-color: #0056b3; }
        .btn-danger { background-color: #dc3545; font-size: 12px; padding: 3px 8px; }
        
        /* 統計卡片 */
        .summary-container { display: flex; gap: 20px; margin-bottom: 20px; }
        .card { flex: 1; background: #f8f9fa; border: 1px solid #ddd; padding: 15px; border-radius: 6px; text-align: center; }
        .card h3 { margin-top: 0; }
        .points { font-size: 24px; font-weight: bold; color: #007bff; }
        
        /* 日誌表格 */
        .log-table { width: 100%; border-collapse: collapse; }
        .log-table th, .log-table td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        .log-table th { background-color: #343a40; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>月份家事工作記錄表</h1>

    <!-- 點數規則對照表 -->
    <h3>📋 家事點數規則表</h3>
    <table class="rules-table">
        <tr>
            <th>家事項目</th>
            <th>點數</th>
            <th>結算規則</th>
        </tr>
        <tr><td>A 收拾餐桌 / 洗碗</td><td>1 點</td><td rowspan="9" style="vertical-align: middle;">每月統計點數：<br>1. 未達基本點數：<b>工資減半</b><br>2. 超過基本點數：<b>每點 $100</b></td></tr>
        <tr><td>B 收倒垃圾 / 資源回收</td><td>1 點</td></tr>
        <tr><td>C 打掃樓梯與走道</td><td>2 點</td></tr>
        <tr><td>D 洗衣服 / 曬衣服</td><td>1 點</td></tr>
        <tr><td>E 整理自己房間</td><td>1 點</td></tr>
        <tr><td>F 媽爸交代工作</td><td>1 點</td></tr>
        <tr><td>G 整理一樓與掃地機器人工作</td><td>2 點</td></tr>
        <tr><td>H 每月記帳</td><td>2 點</td></tr>
        <tr><td>I 其他家事</td><td>1 點</td></tr>
    </table>

    <!-- 登錄表單 -->
    <div class="form-group">
        <h3>➕ 登錄家事紀錄</h3>
        <div class="form-row">
            <label for="dateSelect">日期：</label>
            <input type="date" id="dateSelect">
            
            <label for="childSelect" style="margin-left: 20px;">選擇孩子：</label>
            <select id="childSelect">
                <option value="Wesley">Wesley (基本15點)</option>
                <option value="Sisy">Sisy (基本10點)</option>
            </select>
        </div>
        
        <div class="form-row">
            <label>完成家事項目：</label>
            <div class="checkbox-group" id="choresList">
                <label><input type="checkbox" value="A" data-points="1"> A 收拾餐桌/洗碗 (1點)</label>
                <label><input type="checkbox" value="B" data-points="1"> B 收倒垃圾/資源回收 (1點)</label>
                <label><input type="checkbox" value="C" data-points="2"> C 打掃樓梯與走道 (2點)</label>
                <label><input type="checkbox" value="D" data-points="1"> D 洗衣服/曬衣服 (1點)</label>
                <label><input type="checkbox" value="E" data-points="1"> E 整理自己房間 (1點)</label>
                <label><input type="checkbox" value="F" data-points="1"> F 媽爸交代工作 (1點)</label>
                <label><input type="checkbox" value="G" data-points="2"> G 整理一樓與掃地機器人 (2點)</label>
                <label><input type="checkbox" value="H" data-points="2"> H 每月記帳 (2點)</label>
                <label><input type="checkbox" value="I" data-points="1"> I 其他家事 (1點)</label>
            </div>
        </div>
        <br>
        <button onclick="addRecord()">新增紀錄</button>
        <button class="btn-export" onclick="exportToCSV()">📊 匯出 Excel (CSV)</button>
    </div>

    <!-- 結算統計 -->
    <div class="summary-container">
        <div class="card">
            <h3>Wesley</h3>
            <p>目標：15 點</p>
            <p class="points" id="wesleyPoints">0 點</p>
            <p id="wesleyStatus">-</p>
        </div>
        <div class="card">
            <h3>Sisy</h3>
            <p>目標：10 點</p>
            <p class="points" id="sisyPoints">0 點</p>
            <p id="sisyStatus">-</p>
        </div>
    </div>

    <!-- 詳細明細紀錄 -->
    <h3>📜 歷史紀錄明細</h3>
    <table class="log-table" id="logTable">
        <thead>
            <tr>
                <th>日期</th>
                <th>姓名</th>
                <th>完成項目</th>
                <th>獲得點數</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="logBody">
            <!-- 動態插入資料 -->
        </tbody>
    </table>
</div>

<script>
    // 設定預設日期為今天
    document.getElementById('dateSelect').valueAsDate = new Date();

    // 取得暫存資料
    let records = JSON.parse(localStorage.getItem('choreRecords')) || [];

    // 初始化渲染
    renderTable();

    function addRecord() {
        const date = document.getElementById('dateSelect').value;
        const child = document.getElementById('childSelect').value;
        const checkboxes = document.querySelectorAll('#choresList input[type="checkbox"]:checked');

        if (!date) { alert('請選擇日期！'); return; }
        if (checkboxes.length === 0) { alert('請至少勾選一項家事！'); return; }

        let items = [];
        let totalPoints = 0;

        checkboxes.forEach(cb => {
            items.push(cb.value);
            totalPoints += parseInt(cb.getAttribute('data-points'));
            cb.checked = false; // 清空勾選
        });

        const record = {
            id: Date.now(),
            date: date,
            child: child,
            items: items.join(', '),
            points: totalPoints
        };

        records.push(record);
        saveAndRender();
    }

    function deleteRecord(id) {
        if (confirm('確定要刪除這筆紀錄嗎？')) {
            records = records.filter(r => r.id !== id);
            saveAndRender();
        }
    }

    function saveAndRender() {
        // 按日期排序
        records.sort((a, b) => new Date(b.date) - new Date(a.date));
        localStorage.setItem('choreRecords', JSON.stringify(records));
        renderTable();
    }

    function renderTable() {
        const tbody = document.getElementById('logBody');
        tbody.innerHTML = '';

        let wesleyTotal = 0;
        let sisyTotal = 0;

        records.forEach(r => {
            if (r.child === 'Wesley') wesleyTotal += r.points;
            if (r.child === 'Sisy') sisyTotal += r.points;

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${r.date}</td>
                <td>${r.child}</td>
                <td>${r.items}</td>
                <td>+${r.points} 點</td>
                <td><button class="btn-danger" onclick="deleteRecord(${r.id})">刪除</button></td>
            `;
            tbody.appendChild(tr);
        });

        // 更新統計卡片
        document.getElementById('wesleyPoints').innerText = `${wesleyTotal} 點`;
        document.getElementById('sisyPoints').innerText = `${sisyTotal} 點`;

        // 計算獎勵與判定
        document.getElementById('wesleyStatus').innerHTML = calculateReward(wesleyTotal, 15);
        document.getElementById('sisyStatus').innerHTML = calculateReward(sisyTotal, 10);
    }

    function calculateReward(points, base) {
        if (points < base) {
            return `<span style="color: red;">未達基本點數 (${base}點)<br>⚠️ 工資減半</span>`;
        } else {
            let bonus = points * 100;
            return `<span style="color: green;">已達標！<br>💰 估計獎金: $${bonus}</span>`;
        }
    }

    // 匯出至 Excel (CSV)
    function exportToCSV() {
        if (records.length === 0) {
            alert('目前沒有資料可匯出！');
            return;
        }

        // CSV 表頭（加入 BOM 避免中文亂碼）
        let csvContent = "\uFEFF日期,姓名,家事項目,點數\n";

        records.forEach(r => {
            csvContent += `"${r.date}","${r.child}","${r.items}",${r.points}\n`;
        });

        // 建立下載連結
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `家事紀錄表_${new Date().toISOString().slice(0,10)}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>

</body>
</html>
